<!DOCTYPE html>
<html lang="en">
<head>

<title>KiitoMaru</title>

<style>

body{

    margin:0;
    text-align:center;

}

}

<div class="keyvisual">

<div class="links">

<a href="#">Arrow Bingo</a>
