<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KiitoMaru</title>

<link rel="canonical" href="https://kiitomaru.github.io/">

<meta property="og:type" content="website">
<meta property="og:image" content="https://kiitomaru.github.io/keyvisual.png">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@700&display=swap" rel="stylesheet">

<style>

body{
    background-color: rgb(255,255,255);
    margin:0;
    text-align:center;
    font-family:"M PLUS 1", sans-serif;
}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
}

.name{
    color:rgb(255,51,0);
    font-size:100px;
    margin-right:20px;
}

.banner img{
    width:128px;
    height:128px;
}

.title{
    font-size:60px;
    color:rgb(47,141,104);
    margin-top:60px;
}

.jp{
    font-size:50px;
}

.keyvisual{
    margin-top:20px;
}

.keyvisual img{
    width:512px;
    height:512px;
}

.links{
    margin-top:40px;
}

.links a{
    display:block;
    font-size:40px;
    color:rgb(0,0,0);
    text-decoration:none;
    margin:40px 0;
}

.links a:hover{
    text-decoration:underline;
}

.social{
    margin-top:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:60px;
}

.social a img{
    width:70px;
    height:auto;
}

.youtube-icon{
    transform:scale(1.4);
}

.footer{
    margin-top:100px;
    font-size:30px;
    color:rgb(255,51,0);
}

</style>
</head>

<body>

<div class="header">

<div class="name">
KiitoMaru
</div>

<div class="banner">
<img src="banner.png" alt="banner">
</div>

</div>

<div class="title">
Arrow Bingo<br>
<span class="jp">ヤジルシBINGO</span>
</div>

<div class="keyvisual">
<img src="keyvisual.png" alt="Arrow Bingo">
</div>

<div class="links">

<a href="https://store.steampowered.com/app/3980490/BINGO/">Steam</a>
<a href="#">Android</a>
<a href="#">iOS</a>

</div>

<div class="social">

<a href="https://www.youtube.com/@kiitomaru">
<img src="youtube.png" class="youtube-icon" alt="YouTube">
</a>

<a href="https://x.com/kiitomaru">
<img src="x.png" alt="X">
</a>
