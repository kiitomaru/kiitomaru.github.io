<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KiitoMaru</title>

<link rel="canonical" href="https://kiitomaru.github.io/">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@700&display=swap" rel="stylesheet">

<style>

body{
    background-color: rgb(255,255,255);
    margin:0;
    text-align:center;
    font-family:"M PLUS 1", sans-serif;
}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:40px;
}

.name{
    color:rgb(255,51,0);
    font-size:90px;
    margin-right:20px;
}

.banner img{
    width:128px;
    height:128px;
}

.title{
    font-size:56px;
    color:rgb(47,141,104);
    margin-top:60px;
}

.keyvisual{
    margin-top:20px;
}

.keyvisual img{
    width:512px;
    height:512px;
}

.links{
    margin-top:20px;
}

.links a{
    display:block;
    font-size:28px;
    color:rgb(0,0,0);
    text-decoration:none;
    margin:10px 0;
}

.links a:hover{
    text-decoration:underline;
}

.youtube{
    margin-top:40px;
    font-size:28px;
    color:rgb(0,0,0);
    text-decoration:underline;
}

.footer{
    margin-top:80px;
    font-size:20px;
    color:rgb(255,51,0);
}

</style>
</head>

<body>

<div class="header">

<div class="name">
KiitoMaru
</div>

<div class="banner">
<img src="banner.png" alt="banner">
</div>

</div>

<div class="title">
Arrow Bingo
</div>

<div class="keyvisual">
<img src="keyvisual.png" alt="Arrow Bingo">
</div>

<div class="links">

<a href="https://store.steampowered.com/app/3980490/BINGO/">Steam</a>
<a href="#">Android</a>
<a href="#">iOS</a>

</div>

<div class="youtube">

<a href="https://www.youtube.com/@kiitomaru">YouTube</a>

</div>

<div class="footer">
(c)2026 KiitoMaru
</div>

</body>
</html>
